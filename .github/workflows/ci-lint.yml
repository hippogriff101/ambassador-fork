name: "ci: lint"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.25.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore lint caches
        uses: actions/cache@v5
        with:
          path: |
            .eslintcache
            .stylelintcache
          key: ${{ runner.os }}-lint-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'eslint.config.mjs', 'stylelint.config.mjs', '.htmlvalidate.json', 'src/**/*', 'public/**/*') }}
          restore-keys: |
            ${{ runner.os }}-lint-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'eslint.config.mjs', 'stylelint.config.mjs', '.htmlvalidate.json') }}-
            ${{ runner.os }}-lint-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint checks
        run: pnpm lint