landing:
  metadata:
    title: Ambassador Program

  apply: Apply
  apply-sub: "US, UK, CA, EU, AU, NZ only"
  log-in: Log in
  dashboard: Dashboard

  hero:
    0: Lead the Hack Club Stardance community this summer in
    1: your city.

  intro:
    start: --- START OF MESSAGE ---
    0: This summer, Hack Club is partnering with NASA, AMD, and GitHub to run the world’s biggest engineering challenge, and we need your help to figure out how to drive signups and help hundreds of thousands of students discover Hack Club for the first time.
    1: Your mission, should you choose to accept it, would be to get teenagers from your city to sign up for the Stardance Challenge. Together, we will figure out how to get <strong>100,000 users</strong> through the summer!
    2: By the end of this summer, you will be an expert at driving users for whatever you do in the future. You also get Hack Club t-shirts and merch. Plus, you get a <strong>$100 honorarium</strong>* and <strong>get paid</strong> for every poster you put up and every signup you get. Find more info <faq_link>here</faq_link>. <partyparrot></partyparrot>
    3: Ready?
    footnote: "*If you run 2+ meetups per month in June, July and August, we'll pay you $100 at the end of August."
    end: <<EOF

  past-events:
    title: Past events
    0: In 2025, Hack Clubbers around the world spent over <strong>240,000 hours coding</strong>, building over <strong>23,000 unique projects</strong>.
    1: In 2026, we want to do even better.
    flagship:
      title: Campfire Flagship
      desc: A 3-day flagship game jam in Los Angeles with YouTubers like Michael Reeves, William Osman, and many more!
    blueprint:
      title: Blueprint
      desc: Blueprint gave $140,000 to fund 1,500 hardware and electronics projects built by teenagers.
    midnight:
      title: Midnight
      desc: A murder-mystery hackathon held in Austria, Vienna with 60+ teenagers from all across the world!
    siege:
      title: Siege
      desc: 100+ teens created a project each week for 10 weeks, and received a Framework laptop.

  past-projects:
    title: Past projects built by teenagers in Hack Club
    by: By
    doom-pdf:
      title: Doom PDF
      desc: "A source port of Doom (1993),\nrunning inside a PDF document."
      by: Allen D
    librepods:
      title: LibrePods
      desc: "Airpods liberated from\nApple's ecosystem."
      by: Kavish D
    vert:
      title: VERT
      desc: "A file conversion utility that uses\nWebAssembly to convert files\non-device instead of on the cloud."
      by: Maya
    biblically-accurate:
      title: The Biblically Accurate Macropad
      desc: "A very macro macropad in the shape\nof a biblically accurate angel!"
      by: Alex Tran
    specter:
      title: Specter
      desc: "A game about a knight bravely\ntrying to escape the cave, but\nis haunted by his own ghost."
      by: Ayessa
    blind-defusal:
      title: Blind Defusal
      desc: "A two-player, cooperative\n\"bomb defusal\" game."
      by: Josh, Brandon & Johnathan

