locale:
  html-lang: en
  date-format-locale: en-US

app:
  metadata:
    title: Hack Club Ambassador
    description: Hack Club Ambassador program
  login:
    title: Welcome!
    login: Login
    or: or
    sign-up: Sign Up
    email-placeholder: Email
    alt-login-prefix: Or..
    alt-login-link: sign in with Hack Club
  navbar:
    logo-alt: Ambassador
    admin-link: Admin
    posters-link: Posters
    refresh-session: Refresh session
    settings-label: Settings
    sign-out-label: Sign out

dashboard:
  heading: "Hey, {name}!"
  ineligible-region:
    eyebrow: Not Available
    title: Applications not open in your region
    body: "Unfortunately, the Ambassador program isn't currently available in your region. Update your region in settings if you think this is a mistake."
    cta: Update region
  no-application:
    eyebrow: Get Started
    title: Apply to be an Ambassador
    body: "Ready to represent Hack Club? Fill out a quick application and we'll review it."
    cta: Apply Now
  pending:
    eyebrow: Under review
    title: Application Pending
    body: "Your application submitted on {date} is being reviewed. We'll get back to you soon."
    status: Waiting for review
  pending-automatic-checks:
    eyebrow: One more step
    title: Please verify your ID
    body: Please ID verify at auth.hackclub.com so we can keep moving your application forward.
    cta: Verify at auth.hackclub.com
  approved:
    title: You're an Ambassador!
    body: Congratulations! Your application has been approved. Welcome to the team.
    status: Active Ambassador
  rejected:
    eyebrow: Not Accepted
    title: Application Not Accepted
    body: "Unfortunately your application wasn't accepted this time. Feel free to reach out if you have questions."
  rejected-permanently:
    eyebrow: Permanently Rejected
    title: Application Closed
    body: Your latest application has been permanently rejected. Contact the team directly if you believe this needs review.

posters:
  heading: Posters
  subheading: Print, post, and prove.
  campaign:
    label: Campaign
    placeholder: Pick a campaign
    empty: No campaigns available yet.
  styles:
    color: Full colour
    bw: Black & white
    printer_efficient: Printer-friendly
  actions:
    create-poster: New poster
    create-group: New group
    download: Download
    verify: Verify in the wild
    verify-group: Verify group
    cancel: Cancel
    submit: Submit proof
    submitting: Submitting...
    use-camera: Take a photo
    choose-file: Upload from device
    retake: Retake
    refresh-location: Refresh location
  groups:
    title: Poster groups
    empty: No groups yet. Create one to bundle multiple posters.
    count: "{count, plural, one {# poster} other {# posters}}"
    unnamed: Untitled group
    name-placeholder: Group name (optional)
    size-label: How many posters?
  singles:
    title: Standalone posters
    empty: No standalone posters yet.
  poster-card:
    referral: "Ref {code}"
  status:
    pending: Pending
    in_review: In review
    success: Verified
    rejected: Rejected
    digital: Digital
  verify-modal:
    title: Verify this poster
    description: Put the poster up, snap a photo showing the QR code clearly, and pin your location.
    location-description-label: Location description
    location-description-placeholder: e.g. Cafeteria notice board at Lincoln High
    coordinates: "Coordinates: {lat}, {lng}"
    accuracy: "Accuracy: ±{meters}m"
    location-pending: Waiting for precise location...
    location-error: We could not get your location. Please allow precise location access and try again.
    location-retry: Try again
    image-required: A photo of the poster is required.
    auto-detect: We will auto-match the QR code to one of your pending posters.
  results:
    success: Poster verified automatically.
    auto_matched: We matched this photo to a different pending poster of yours and verified it.
    already_verified: This poster has already been verified.
    in_review: Sent to review — a human will check it soon.
    no_qr: We could not read a QR code. Try again with a clearer photo.
    no_match: The QR code did not match any of your pending posters.
    wrong_group: That QR belongs to a different group or poster.
  errors:
    create-failed: Could not create poster.
    load-failed: Could not load your posters.
    download-failed: Download failed.
    upload-failed: Submission failed.
    geolocation-unavailable: Your browser does not support geolocation.
    geolocation-denied: Precise location access was denied. Please enable it in your browser settings.

settings:
  heading: Settings
  form:
    labels:
      name: Name
      first-name: First name
      last-name: Last name
      email: Email
      slack: Slack
      verification-status: Verification status
      shipping-address: Shipping address
      region: Region
    actions:
      save: Save
      saving: Saving...
      saved: Saved!
    errors:
      generic: Something went wrong.
      unauthorized: Refresh your session and try again.
      invalid-address-index: Pick a valid shipping address.
      invalid-region: Pick a valid region.

error-pages:
  preview:
    title: Error pages
    description: Open each route to preview and tweak that error page.
    not-found: Preview 404 page
    unauthorized: Preview 401 page
    forbidden: Preview 403 page
    internal: Preview 500 page
  not-found:
    code: "404"
    title: Page not found
    description: The page you requested does not exist or may have moved.
    action: Go to login
  unauthorized:
    code: "401"
    title: Unauthorized
    description: Your session is missing or expired. Please sign in and try again.
    action: Sign in again
  forbidden:
    code: "403"
    title: Forbidden
    description: You do not have permission to access this resource.
    action: Go to dashboard
  internal:
    code: "500"
    title: Something went wrong
    description: An unexpected error interrupted this page.
    retry: Try again
    action: Go to dashboard

