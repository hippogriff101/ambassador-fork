dashboard:
  metadata:
    title: Dashboard
  heading: "Hey, {name}!"
  mock-onboarding-alert:
    title: "Admin override:"
    body: "You don't have a linked onboarding record, so this view uses mock onboarding data. {hcbEmail} stands in for hcb_email."
  stepper:
    apply: Apply
    verify: Verify ID
    review: Review
    decision: Decision
  ineligible-region:
    eyebrow: Not Available
    title: Applications not open in your region
    body: "Unfortunately, the Ambassador program isn't currently available in your region. Update your region in settings if you think this is a mistake."
    cta: Update region
  no-application:
    eyebrow: Get Started
    title: Apply to be an Ambassador
    body: "Ready to represent Hack Club's Stardance? Fill out a quick application and we'll review it."
    cta: Apply Now
  pending:
    eyebrow: Under review
    title: Application Pending
    body: "Your application submitted on {date} is being reviewed. We'll get back to you soon."
    status: Waiting for review
  pending-automatic-checks:
    eyebrow: One more step
    title: Please verify your ID
    body: Please verify your ID at auth.hackclub.com so we can keep moving your application forward.
    support: "In case it does not update soon (takes anywhere from a minute to an hour), email ambassadors@hackclub.com so we can help you."
    cta: Verify at auth.hackclub.com
  approved:
    eyebrow: Accepted
    title: You're an Ambassador!
    body: Your application has been approved. Welcome to the team!
    status: Active Ambassador
  onboarding:
    title: "Complete onboarding first:"
    body-prefix: Finish
    body-link: ambassador onboarding
    body-suffix: to unlock your office grant and to order a shirt.
    cta: Complete onboarding
    disabled-title: "Onboarding is paused:"
    disabled-body: Ambassador onboarding is temporarily disabled. We will let you know when it's available again.
    status:
      submitted:
        title: "Onboarding submitted:"
        body: Thank you for submitting your onboarding information! You will receive a contract via email shortly.
      pending-signature:
        title: "Contract pending signature:"
        body: Your contract is pending one or more signatures. Please make sure you have signed it and wait patiently while we process it on our end.
      completed:
        title: "Onboarding complete:"
        body: Onboarding is done.
  rejected:
    eyebrow: Try Again
    title: Apply to be an Ambassador
    body: "Your last application wasn't accepted, but you can submit a new one and we'll review it."
    cta: Apply Again
  rejected-permanently:
    eyebrow: Permanently Rejected
    title: Application Closed
    body: "Your latest application has been permanently rejected. Please email ambassadors@hackclub.com if you think this is erroneous."

